server {
  listen 80;
  server_name localhost;

  root  /usr/share/nginx/html;
  index index.html;

  # Route backend calls to the private ECS backend service discovered via
  # Cloud Map DNS. In local Docker Compose, BACKEND_UPSTREAM defaults to
  # backend:8080.
  resolver 169.254.169.253 valid=10s ipv6=off;
  set $backend_upstream ${BACKEND_UPSTREAM};

  location ~ ^/(api|auth)(/|$) {
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Short-code redirects are handled by the backend controller (HTTP 302).
  location ~ ^/[a-zA-Z0-9]{4,10}$ {
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── React SPA ──────────────────────────────────────────────────────────────
  # All non-API routes are handled by the React app (client-side routing).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── Gzip compression ───────────────────────────────────────────────────────
  gzip            on;
  gzip_types      text/plain text/css application/json application/javascript
                  text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;

  error_page 404 /index.html;
}
