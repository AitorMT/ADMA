# ─────────────────────────────────────────────────────────────────────────────
# Application – URL Shortener backend
# All sensitive values are injected via environment variables.
# Never commit real secrets to version control.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  application:
    name: url-shortener-backend

  # ── DataSource (AWS RDS – PostgreSQL) ─────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:urlshortener}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update # use 'validate' in production with Flyway/Liquibase
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── ShedLock table init (dev only) ─────────────────────────────────────────
  # Creates the shedlock table on startup if it doesn't exist.
  # In production, run db/shedlock.sql against RDS before the first deploy.
  sql:
    init:
      mode: always
      schema-locations: classpath:db/shedlock.sql

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ── JWT ───────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:changeme-this-must-be-at-least-32-chars-long!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 h by default

  # ── Base URL (used when building fully-qualified short URLs) ────────────────
  base-url: ${APP_BASE_URL:}

  # ── Frontend URL (used to redirect browser to SPA error pages) ──────────────
  frontend-url: ${FRONTEND_URL:http://localhost}

  # ── CORS allowed origins (comma-separated) ──────────────────────────────────
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:3000,http://localhost:5173}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    adma.sa2_sa3.backend: DEBUG
    # Silence the expected warning about UserDetailsService being bypassed when
    # an explicit AuthenticationProvider bean is registered (this is intentional).
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
